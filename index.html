<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DraftHouse</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link rel="stylesheet" href="styles.css">
<script>
  // DRL language for hljs (from Sparge)
  // Runs immediately — CDN scripts above are synchronous, hljs and marked are available.
  // Must NOT be wrapped in DOMContentLoaded — module scripts execute after DOMContentLoaded,
  // so the diff panel would call marked.parse() before marked.use() configures the renderer.
  hljs.registerLanguage('drl', h => ({
    keywords: { keyword: 'rule when then end import package declare salience agenda-group ruleflow-group lock-on-active no-loop accumulate collect from exists forall not and or modify update insert retract delete global eval query function' },
    contains: [h.C_LINE_COMMENT_MODE, h.C_BLOCK_COMMENT_MODE, h.QUOTE_STRING_MODE, h.C_NUMBER_MODE]
  }));
  marked.use({ renderer: { code(code, lang) {
    const language = lang && hljs.getLanguage(lang) ? lang : null;
    const hi = language ? hljs.highlight(code, { language, ignoreIllegals: true }).value
                        : (code ? hljs.highlightAuto(code).value : code);
    return `<pre><code class="hljs${language ? ` language-${language}` : ''}">${hi}</code></pre>\n`;
  }}});
</script>
<script type="module" src="panels/drafthouse-diff.js"></script>
<script type="module" src="panels/drafthouse-debate.js"></script>
<script type="module" src="panels/drafthouse-review-tracker.js"></script>
<script type="module" src="panels/drafthouse-context-gauge.js"></script>
</head>
<body>

<!-- ── Top bar ── -->
<div id="topbar">
  <div id="logo">DraftHouse</div>
  <div class="sep"></div>
  <button id="btn-sync" class="active" title="Sync scroll between panels">⟺ Sync</button>
  <button id="btn-swap" title="Swap panels A↔B" disabled style="opacity:.4">⇄ Swap</button>
  <button id="btn-view-mode" title="Toggle split/unified view (u)">⫏ Split</button>
  <button id="btn-prev" title="Previous diff (p)" disabled style="opacity:.4">↑</button>
  <button id="btn-next" title="Next diff (n)" disabled style="opacity:.4">↓</button>
  <span id="diff-counter" style="font-size:11px;color:#a09080;padding:0 4px;min-width:36px;display:inline-block;text-align:center">— / —</span>
  <span id="diff-summary" data-tooltip="" style="font-size:11px;color:#a09080;padding:0 6px;cursor:default;position:relative"></span>
  <span id="diff-legend" title="A only · B only">
    <span class="legend-swatch legend-del"></span><span class="legend-label">A</span>
    <span class="legend-swatch legend-ins"></span><span class="legend-label">B</span>
  </span>
  <span id="doc-badge" class="hidden" title="Working set documents">
    <span id="doc-count"></span>
    <div id="doc-dropdown" class="hidden"></div>
  </span>
  <div id="topbar-spacer"></div>
  <button id="btn-debate" title="Toggle debate panel">💬 Debate</button>
  <button id="btn-review" title="Toggle review tracker">☑ Review</button>
</div>

<!-- ── Workspace slots ── -->
<div id="main">
  <div id="panels">
    <div class="slot slot-left" id="slot-left"></div>
    <div class="slot-divider" id="slot-divider"></div>
    <div class="slot slot-right" id="slot-right">
      <div class="slot slot-right-top" id="slot-right-top"></div>
      <div class="slot-divider-h" id="slot-divider-h"></div>
      <div class="slot slot-right-bottom" id="slot-right-bottom"></div>
    </div>
  </div>
</div>

<script type="module">
'use strict';
import { registry } from './panels/panel-registry.js';
import { debateEventBus } from './panels/debate-event-bus.js';

const $ = id => document.getElementById(id);

// ── Create panels ───────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const isElectron = typeof window.compare !== 'undefined';

const diffPanel = registry.create('drafthouse-diff', {
  pathA: isElectron ? null : params.get('a'),
  pathB: isElectron ? null : params.get('b'),
});
$('slot-left').appendChild(diffPanel);

const debatePanel = registry.create('drafthouse-debate', {});
$('slot-right-top').appendChild(debatePanel);

const reviewPanel = registry.create('drafthouse-review-tracker', {});
$('slot-right-bottom').appendChild(reviewPanel);

const contextGauge = registry.create('drafthouse-context-gauge', {});
$('topbar').insertBefore(contextGauge, $('topbar-spacer'));

// ── Topbar button wiring ────────────────────────────────────────────
function updateSyncButton() {
  $('btn-sync').classList.toggle('active', diffPanel.syncEnabled);
}

function updateDiffUI() {
  const s = diffPanel.getDiffSummary();
  // Counter
  $('diff-counter').textContent = s.currentIdx >= 0
    ? `${s.currentIdx + 1} / ${s.totalDiffs}` : '— / —';
  // Summary
  const el = $('diff-summary');
  if (s.modified + s.deleted + s.inserted === 0) {
    el.textContent = '';
    el.dataset.tooltip = '';
  } else {
    const parts = [];
    if (s.modified) parts.push(`~${s.modified}`);
    if (s.deleted) parts.push(`−${s.deleted}`);
    if (s.inserted) parts.push(`+${s.inserted}`);
    el.textContent = parts.join(' ');
    el.dataset.tooltip = '~ modified · − only in A · + only in B';
  }
  // Nav buttons
  const has = s.totalDiffs > 0;
  $('btn-prev').disabled = !has;
  $('btn-next').disabled = !has;
  $('btn-prev').style.opacity = has ? '' : '0.4';
  $('btn-next').style.opacity = has ? '' : '0.4';
  // Swap button — enabled when diffs exist (both files loaded)
  $('btn-swap').disabled = !has;
  $('btn-swap').style.opacity = has ? '' : '0.4';
}

$('btn-sync').addEventListener('click', () => {
  diffPanel.toggleSync();
  updateSyncButton();
});
$('btn-swap').addEventListener('click', () => {
  diffPanel.swapPanels();
  updateDiffUI();
});
$('btn-prev').addEventListener('click', () => {
  diffPanel.prevDiff();
  updateDiffUI();
});
$('btn-next').addEventListener('click', () => {
  diffPanel.nextDiff();
  updateDiffUI();
});
$('btn-view-mode').addEventListener('click', () => {
  const mode = diffPanel.viewMode === 'split' ? 'unified' : 'split';
  diffPanel.setViewMode(mode);
  $('btn-view-mode').textContent = mode === 'split' ? '⫏ Split' : '☰ Unified';
});

// Listen for diff-updated events from the panel
document.addEventListener('diff-updated', () => updateDiffUI());

// ── Panel toggle buttons ────────────────────────────────────────────
let debateVisible = true, reviewVisible = true;

function updateSlotVisibility() {
  $('slot-right-top').classList.toggle('hidden', !debateVisible);
  $('slot-right-bottom').classList.toggle('hidden', !reviewVisible);
  $('slot-divider-h').classList.toggle('hidden', !debateVisible || !reviewVisible);
  const rightHidden = !debateVisible && !reviewVisible;
  $('slot-right').classList.toggle('hidden', rightHidden);
  $('slot-divider').classList.toggle('hidden', rightHidden);
  $('btn-debate').classList.toggle('active', debateVisible);
  $('btn-review').classList.toggle('active', reviewVisible);
}

$('btn-debate').addEventListener('click', () => {
  debateVisible = !debateVisible;
  updateSlotVisibility();
});
$('btn-review').addEventListener('click', () => {
  reviewVisible = !reviewVisible;
  updateSlotVisibility();
});

// ── Cross-panel event routing ───────────────────────────────────────
document.addEventListener('point-selected', e => {
  const location = e.detail?.location;
  if (location) diffPanel.scrollToLocation(location);
});

diffPanel.addEventListener('selection-changed', async (e) => {
  if (!debateEventBus.sessionId) return;
  const { side, startLine, endLine, selectedText } = e.detail;
  if (!selectedText) return;
  await fetch(`/api/debate/${debateEventBus.sessionId}/selection`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ side, startLine, endLine, selectedText })
  });
});

// ── Document metadata event subscriber ─────────────────────────────
debateEventBus.subscribe({
  onEntries() {},
  onMeta(data) {
    if (data.type === 'comparison-changed') {
      if (data.pathA && data.pathB) {
        diffPanel.loadFile('a', data.pathA);
        diffPanel.loadFile('b', data.pathB);
      }
    }
    if (data.type === 'documents-changed') {
      updateDocBadge(data.documents || []);
    }
  }
});

// ── Document badge and dropdown ────────────────────────────────────
let currentDocuments = [];

function updateDocBadge(docs) {
  currentDocuments = docs;
  const badge = $('doc-badge');
  const count = $('doc-count');
  if (docs.length > 1) {
    badge.classList.remove('hidden');
    count.textContent = docs.length + ' docs';
  } else {
    badge.classList.add('hidden');
  }
}

$('doc-badge').addEventListener('click', (e) => {
  e.stopPropagation();
  const dd = $('doc-dropdown');
  dd.classList.toggle('hidden');
  if (!dd.classList.contains('hidden')) {
    dd.innerHTML = '';
    for (const doc of currentDocuments) {
      const row = document.createElement('div');
      row.className = 'doc-row';
      const labelSpan = document.createElement('span');
      labelSpan.className = 'doc-label';
      labelSpan.textContent = doc.label;
      const pathSpan = document.createElement('span');
      pathSpan.className = 'doc-path';
      pathSpan.textContent = doc.path;
      const btnA = document.createElement('button');
      btnA.className = 'doc-assign';
      btnA.dataset.slot = 'a';
      btnA.textContent = 'A';
      const btnB = document.createElement('button');
      btnB.className = 'doc-assign';
      btnB.dataset.slot = 'b';
      btnB.textContent = 'B';
      row.append(labelSpan, pathSpan, btnA, btnB);
      row.querySelectorAll('.doc-assign').forEach(btn => {
        btn.addEventListener('click', async (ev) => {
          ev.stopPropagation();
          const slot = btn.dataset.slot;
          diffPanel.loadFile(slot, doc.path);
          if (debateEventBus.sessionId) {
            const currentA = slot === 'a' ? doc.path : (diffPanel.currentPath('a') || '');
            const currentB = slot === 'b' ? doc.path : (diffPanel.currentPath('b') || '');
            if (currentA && currentB) {
              await fetch('/api/debate/' + debateEventBus.sessionId + '/comparison', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pathA: currentA, pathB: currentB })
              });
            }
          }
          dd.classList.add('hidden');
        });
      });
      dd.appendChild(row);
    }
  }
});

document.addEventListener('click', () => {
  $('doc-dropdown').classList.add('hidden');
});

// ── Session discovery polling (§7a) ─────────────────────────────────
let discoveryInterval = null;

function connectDebateSession(sessionId) {
  debateEventBus.connect(sessionId);
  debatePanel.configure({ debateSessionId: sessionId });
  reviewPanel.configure({ debateSessionId: sessionId });
  // Fetch initial document set
  fetch('/api/debate/' + sessionId + '/documents')
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data) return;
      updateDocBadge(data.documents || []);
      if (data.currentComparison) {
        diffPanel.loadFile('a', data.currentComparison.pathA);
        diffPanel.loadFile('b', data.currentComparison.pathB);
      }
    })
    .catch(() => {});
}

function showSessionPicker(sessions) {
  const slot = $('slot-right-top');
  // Clear debate panel temporarily and show picker
  const picker = document.createElement('div');
  picker.style.cssText = 'padding:24px;color:var(--sepia);font-size:13px;';
  picker.innerHTML = '<h3 style="margin-bottom:12px;color:var(--ink)">Active Debate Sessions</h3>';
  for (const session of sessions) {
    const btn = document.createElement('button');
    btn.textContent = session.debateSessionId;
    btn.style.cssText = 'display:block;margin:6px 0;width:100%;text-align:left;';
    btn.addEventListener('click', () => {
      picker.remove();
      connectDebateSession(session.debateSessionId);
    });
    picker.appendChild(btn);
  }
  slot.insertBefore(picker, slot.firstChild);
}

function startSessionDiscovery() {
  discoveryInterval = setInterval(async () => {
    try {
      const res = await fetch('/api/debate/sessions');
      if (!res.ok) return;
      const sessions = await res.json();
      if (sessions.length === 1) {
        clearInterval(discoveryInterval);
        discoveryInterval = null;
        connectDebateSession(sessions[0].debateSessionId);
      } else if (sessions.length > 1) {
        clearInterval(discoveryInterval);
        discoveryInterval = null;
        showSessionPicker(sessions);
      }
    } catch (_) { /* ignore — server may not be up yet */ }
  }, 5000);
}

const debateParam = params.get('debate');
if (debateParam) {
  connectDebateSession(debateParam);
} else {
  startSessionDiscovery();
}

// ── Slot divider dragging ───────────────────────────────────────────
let slotDragging = false;
let slotDraggingH = false;

$('slot-divider').addEventListener('mousedown', () => { slotDragging = true; });
$('slot-divider-h').addEventListener('mousedown', () => { slotDraggingH = true; });

document.addEventListener('mousemove', e => {
  if (slotDragging) {
    const r = $('panels').getBoundingClientRect();
    const pct = Math.max(20, Math.min(80, (e.clientX - r.left) / r.width * 100));
    $('slot-left').style.flex = 'none';
    $('slot-left').style.width = pct + '%';
    $('slot-right').style.flex = '1';
    $('slot-right').style.width = '';
  }
  if (slotDraggingH) {
    const r = $('slot-right').getBoundingClientRect();
    const pct = Math.max(20, Math.min(80, (e.clientY - r.top) / r.height * 100));
    $('slot-right-top').style.flex = 'none';
    $('slot-right-top').style.height = pct + '%';
    $('slot-right-bottom').style.flex = '1';
    $('slot-right-bottom').style.height = '';
  }
});

document.addEventListener('mouseup', () => {
  slotDragging = false;
  slotDraggingH = false;
});

// ── Keyboard shortcuts ──────────────────────────────────────────────
function isEditable(el) {
  const tag = el.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || el.isContentEditable) return true;
  // Shadow DOM: e.target is the host, not the inner focused element.
  // Walk activeElement through shadow roots to find the real focused element.
  let active = document.activeElement;
  while (active && active.shadowRoot && active.shadowRoot.activeElement) {
    active = active.shadowRoot.activeElement;
  }
  if (active && active !== el) {
    const t = active.tagName;
    if (t === 'INPUT' || t === 'TEXTAREA' || t === 'SELECT' || active.isContentEditable) return true;
  }
  return false;
}

function toggleShortcutsOverlay() {
  $('shortcuts-overlay').classList.toggle('hidden');
  $('shortcuts-backdrop').classList.toggle('hidden');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !$('shortcuts-overlay').classList.contains('hidden')) {
    toggleShortcutsOverlay();
    return;
  }
  if (isEditable(e.target)) return;
  if (e.key === '?') { toggleShortcutsOverlay(); return; }
  if (e.key === 's' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); diffPanel.toggleSync(); updateSyncButton(); }
  if (e.key === 'n') { diffPanel.nextDiff(); updateDiffUI(); }
  if (e.key === 'p') { diffPanel.prevDiff(); updateDiffUI(); }
  if (e.key === 'u') { $('btn-view-mode').click(); }
});

$('shortcuts-backdrop').addEventListener('click', toggleShortcutsOverlay);

// ── Electron IPC (if running in Electron shell) ─────────────────────
if (isElectron) {
  window.compare.onInitConfig(async cfg => {
    diffPanel.configure({ apiPort: cfg.port });
  });
  window.compare.onInitFiles((a, b) => {
    if (a) diffPanel.loadFile('a', a);
    if (b) diffPanel.loadFile('b', b);
  });
}

// Suppress browser-level drag-drop
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => e.preventDefault());

// Initial slot visibility
updateSlotVisibility();
</script>

<!-- ── Keyboard shortcuts overlay ── -->
<div id="shortcuts-backdrop" class="hidden"></div>
<div id="shortcuts-overlay" class="hidden">
  <h3>Keyboard Shortcuts</h3>
  <table>
    <tr><td><kbd>n</kbd></td><td>Next diff</td></tr>
    <tr><td><kbd>p</kbd></td><td>Previous diff</td></tr>
    <tr><td><kbd>u</kbd></td><td>Toggle split/unified view</td></tr>
    <tr><td><kbd>⌘/Ctrl+S</kbd></td><td>Toggle scroll sync</td></tr>
    <tr><td><kbd>?</kbd></td><td>Show/hide shortcuts</td></tr>
  </table>
</div>

</body>
</html>
