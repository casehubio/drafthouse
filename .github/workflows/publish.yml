name: CI

on:
  repository_dispatch:
    types: [upstream-published]
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Checkout casehub-pages (webui file: dependencies)
        uses: actions/checkout@v4
        with:
          repository: casehubio/casehub-pages
          path: .pages-checkout
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build pages packages and create symlink
        run: |
          cd .pages-checkout && corepack enable && yarn install --immutable && yarn build
          cd ..
          ln -s "$GITHUB_WORKSPACE/.pages-checkout" "$GITHUB_WORKSPACE/../pages"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('server/pom.xml') }}
          restore-keys: playwright-

      - name: Build
        run: cd server && mvn --batch-mode install -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright browsers
        if: github.event_name == 'pull_request'
        run: cd server && mvn --batch-mode -pl runtime exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium" -Dexec.classpathScope=test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        if: github.event_name == 'pull_request'
        run: cd server && mvn --batch-mode test -pl runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        if: github.event_name != 'pull_request'
        run: cd server && mvn --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
