quarkus.http.port=9001
quarkus.package.jar.type=uber-jar
quarkus.package.output-name=drafthouse-server

# Quinoa frontend build
quarkus.quinoa.build-dir=dist
quarkus.quinoa.enable-spa-routing=true
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.node-version=22.11.0
# Enable Quinoa in test profile — required for Playwright E2E tests that
# navigate to the UI. Quinoa is disabled in test mode by default.
%test.quarkus.quinoa=true

# CORS — scoped to dev/test only; do not enable wildcard origins in prod
%dev.quarkus.http.cors.origins=*
%dev.quarkus.http.cors.methods=GET,POST,OPTIONS
%test.quarkus.http.cors.origins=*
%test.quarkus.http.cors.methods=GET,POST,OPTIONS

# Qhorus named datasource (H2 in-memory for dev/test; configure PostgreSQL for prod).
# All schema migrations are owned by casehub-qhorus (classpath:db/migration/qhorus).
quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:qhorus;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.flyway.qhorus.migrate-at-start=true
quarkus.flyway.qhorus.locations=classpath:db/ledger/migration,classpath:db/qhorus/migration,classpath:db/drafthouse/migration

# Extend Qhorus persistence unit to include DraftHouse entities
quarkus.hibernate-orm.qhorus.packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime,io.casehub.drafthouse

# JPA debate session persistence (disabled by default; enable for production)
casehub.drafthouse.persistence.enabled=false

# Reviewer configuration
casehub.drafthouse.reviewer.max-doc-chars=100000

%dev.quarkus.log.level=INFO
%test.quarkus.http.port=9002
# Dummy API key satisfies config validation in test profile; DocumentReviewer is mocked via @InjectMock
%test.quarkus.langchain4j.anthropic.api-key=test-key

# Review session storage root (defaults to ~/.drafthouse/reviews)
# casehub.drafthouse.storage.root=/custom/path

# Context meter (defaults shown — override for larger/smaller models)
# casehub.drafthouse.context.window-size-chars=800000
# casehub.drafthouse.context.threshold-percent=80
%test.casehub.drafthouse.storage.root=${java.io.tmpdir}/drafthouse-test-sessions
